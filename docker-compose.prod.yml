
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - APP_MODE=prod
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Ограничения ресурсов (современный синтаксис)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # ОСТАВЛЯЕМ ТОЛЬКО ЭТУ ДИРЕКТИВУ!
    # Docker Compose сам возьмет POSTGRES_DB, POSTGRES_USER и POSTGRES_PASSWORD из .env файла
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Ограничения ресурсов (современный синтаксис)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-itbase}_postgres_data

networks:
  default:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-itbase}_network